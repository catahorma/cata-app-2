<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asesor UX - Clínica Las Condes</title>
    <!-- React & ReactDOM from CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #e0e0e0; }
        .markdown-container h1 { font-size: 1.5rem; font-weight: bold; color: #f97316; margin-top: 1rem; }
        .markdown-container h2 { font-size: 1.25rem; font-weight: bold; color: #fb923c; margin-top: 1rem; }
        .markdown-container p { margin-bottom: 0.75rem; line-height: 1.6; }
        .markdown-container ul { list-style: disc; padding-left: 1.5rem; margin-bottom: 1rem; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SYSTEM_PROMPT = `Eres un consultor senior de Business UX llamado "Asesor UX" con experiencia en empresas latinoamericanas. Combinas estrategia de negocio con metodología UX.

PROYECTO DEL ALUMNO:
→ Empresa: Clínica Las Condes
→ Problema: alto abandono en el flujo de pago de la app
→ Usuario: mujeres 30-45 años que compran desde el móvil

TU TRABAJO:
1. Validar hipótesis de negocio
2. Dar feedback crítico y honesto (no seas complaciente)
3. Estimar el ROI de propuestas UX
4. Identificar oportunidades de IA en la solución
5. Ayudar a armar el caso de negocio para stakeholders

CÓMO EVALÚAS CADA PROPUESTA — sigue este orden:
1. Diagnóstico: [qué entendiste]
2. Lo que funciona: [puntos fuertes]
3. Riesgos: [sé directo]
4. Métrica sugerida: [cómo medir el éxito]
5. Próximo paso: [acción concreta]

Si te piden calcular ROI, usa:
📈 ROI UX estimado:
- Problema actual: ...
- Mejora proyectada: ...%
- Impacto estimado: ...
- Supuestos clave: ...

Responde siempre en español. Tono profesional y directo. Máximo 350 palabras por respuesta.`;

        function App() {
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [isConfigured, setIsConfigured] = useState(!!apiKey);
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [showSystemPrompt, setShowSystemPrompt] = useState(false);
            const messagesEndRef = useRef(null);

            const scrollToBottom = () => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                scrollToBottom();
                lucide.createIcons();
            }, [messages, isConfigured]);

            const handleSaveApiKey = (e) => {
                e.preventDefault();
                if (apiKey.trim()) {
                    localStorage.setItem('gemini_api_key', apiKey.trim());
                    setIsConfigured(true);
                }
            };

            const handleSendMessage = async (e) => {
                e.preventDefault();
                if (!input.trim() || isLoading) return;

                const userMessage = { role: 'user', content: input };
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setIsLoading(true);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] },
                            contents: [
                                ...messages.map(m => ({ 
                                    role: m.role === 'user' ? 'user' : 'model', 
                                    parts: [{ text: m.content }] 
                                })),
                                { role: 'user', parts: [{ text: input }] }
                            ]
                        })
                    });

                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Error en la respuesta.";
                    
                    setMessages(prev => [...prev, { role: 'assistant', content: text }]);
                } catch (error) {
                    setMessages(prev => [...prev, { role: 'assistant', content: "Error: No se pudo conectar con la API. Verifica tu clave." }]);
                } finally {
                    setIsLoading(false);
                }
            };

            if (!isConfigured) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="max-w-md w-full bg-[#141414] border border-white/10 rounded-2xl p-8 shadow-2xl">
                            <div className="flex justify-center mb-6">
                                <i data-lucide="shield-check" className="w-12 h-12 text-orange-500"></i>
                            </div>
                            <h1 className="text-2xl font-bold text-center mb-2 tracking-tight">Asesor UX AI</h1>
                            <p className="text-gray-400 text-center mb-8 text-sm">Configura tu acceso para Clínica Las Condes.</p>
                            <form onSubmit={handleSaveApiKey} className="space-y-4">
                                <div className="space-y-2">
                                    <label className="text-xs uppercase tracking-widest text-gray-500 font-semibold">Gemini API Key</label>
                                    <input 
                                        type="password" 
                                        value={apiKey}
                                        onChange={(e) => setApiKey(e.target.value)}
                                        placeholder="Ingresa tu clave de API..."
                                        className="w-full bg-[#1a1a1a] border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-orange-500/50"
                                        required
                                    />
                                </div>
                                <button type="submit" className="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-orange-500/20">
                                    Comenzar Consultoría
                                </button>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="border-b border-white/10 bg-[#141414]/80 backdrop-blur-md sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-orange-500 rounded-xl flex items-center justify-center">
                                <i data-lucide="zap" className="w-6 h-6 text-white"></i>
                            </div>
                            <div>
                                <h1 className="font-bold text-lg leading-none">Asesor UX</h1>
                                <p className="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Senior Business Consultant</p>
                            </div>
                        </div>
                        <button onClick={() => { localStorage.removeItem('gemini_api_key'); setIsConfigured(false); }} className="text-gray-400 hover:text-white">
                            <i data-lucide="settings" className="w-5 h-5"></i>
                        </button>
                    </header>

                    <main className="flex-1 overflow-hidden flex flex-col max-w-4xl mx-auto w-full">
                        <div className="px-6 py-2">
                            <button onClick={() => setShowSystemPrompt(!showSystemPrompt)} className="w-full flex items-center justify-between p-3 bg-[#1a1a1a] border border-white/5 rounded-xl hover:bg-[#222222] transition-colors mt-2">
                                <div className="flex items-center gap-2">
                                    <i data-lucide="target" className="w-4 h-4 text-orange-500"></i>
                                    <span className="text-xs font-semibold uppercase tracking-wider text-gray-400">System Instruction (Review Mode)</span>
                                </div>
                                <i data-lucide={showSystemPrompt ? "chevron-up" : "chevron-down"} className="w-4 h-4 text-gray-400"></i>
                            </button>
                            {showSystemPrompt && (
                                <div className="p-4 mt-2 bg-[#141414] border border-white/5 rounded-xl text-[12px] text-gray-400 font-mono whitespace-pre-wrap max-h-48 overflow-y-auto">
                                    {SYSTEM_PROMPT}
                                </div>
                            )}
                        </div>

                        <div className="flex-1 overflow-y-auto px-6 py-4 space-y-6">
                            {messages.length === 0 && (
                                <div className="h-full flex flex-col items-center justify-center text-center space-y-6 max-w-md mx-auto opacity-50">
                                    <i data-lucide="credit-card" className="w-12 h-12 text-orange-500"></i>
                                    <div>
                                        <h2 className="text-xl font-bold">Clínica Las Condes</h2>
                                        <p className="text-sm">Inicia la consultoría sobre el flujo de pago móvil.</p>
                                    </div>
                                </div>
                            )}
                            {messages.map((msg, idx) => (
                                <div key={idx} className={`flex gap-4 ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    {msg.role === 'assistant' && <div className="w-8 h-8 rounded-full bg-orange-500 flex items-center justify-center shrink-0 mt-1"><i data-lucide="bot" className="w-5 h-5 text-white"></i></div>}
                                    <div className={`max-w-[85%] rounded-2xl px-5 py-4 ${msg.role === 'user' ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-[#1a1a1a] border border-white/10 rounded-tl-none'}`}>
                                        <div className="markdown-container text-sm" dangerouslySetInnerHTML={{ __html: marked.parse(msg.content) }}></div>
                                    </div>
                                    {msg.role === 'user' && <div className="w-8 h-8 rounded-full bg-[#333] flex items-center justify-center shrink-0 mt-1"><i data-lucide="user" className="w-4 h-4 text-gray-300"></i></div>}
                                </div>
                            ))}
                            {isLoading && <div className="text-orange-500 text-xs animate-pulse font-bold">Asesor UX está pensando...</div>}
                            <div ref={messagesEndRef} />
                        </div>

                        <div className="p-6">
                            <form onSubmit={handleSendMessage} className="relative flex items-center">
                                <input 
                                    type="text" 
                                    value={input}
                                    onChange={(e) => setInput(e.target.value)}
                                    placeholder="Escribe tu propuesta..."
                                    className="w-full bg-[#1a1a1a] border border-white/10 rounded-2xl px-6 py-4 pr-16 text-sm text-white focus:outline-none focus:border-orange-500/50"
                                />
                                <button type="submit" className="absolute right-3 p-2 bg-orange-500 text-white rounded-xl">
                                    <i data-lucide="send" className="w-5 h-5"></i>
                                </button>
                            </form>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
